name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ThermoElasticCalculator.sln

    - name: Build
      run: dotnet build ThermoElasticCalculator.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test ThermoElasticCalculator.sln --no-build --configuration Release --verbosity normal

    - name: Publish all platforms
      run: |
        dotnet publish src/ThermoElastic.Desktop/ThermoElastic.Desktop.csproj -c Release -r win-x64 --self-contained -o publish/win-x64
        dotnet publish src/ThermoElastic.Desktop/ThermoElastic.Desktop.csproj -c Release -r linux-x64 --self-contained -o publish/linux-x64
        dotnet publish src/ThermoElastic.Desktop/ThermoElastic.Desktop.csproj -c Release -r osx-x64 --self-contained -o publish/osx-x64
        dotnet publish src/ThermoElastic.Desktop/ThermoElastic.Desktop.csproj -c Release -r osx-arm64 --self-contained -o publish/osx-arm64

    - name: Create archives
      run: |
        cd publish
        tar -czf ThermoElasticCalculator-win-x64.tar.gz -C win-x64 .
        tar -czf ThermoElasticCalculator-linux-x64.tar.gz -C linux-x64 .
        tar -czf ThermoElasticCalculator-osx-x64.tar.gz -C osx-x64 .
        tar -czf ThermoElasticCalculator-osx-arm64.tar.gz -C osx-arm64 .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          publish/ThermoElasticCalculator-win-x64.tar.gz
          publish/ThermoElasticCalculator-linux-x64.tar.gz
          publish/ThermoElasticCalculator-osx-x64.tar.gz
          publish/ThermoElasticCalculator-osx-arm64.tar.gz
