name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ThermoElasticCalculator.sln

    - name: Build
      run: dotnet build ThermoElasticCalculator.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test ThermoElasticCalculator.sln --no-build --configuration Release --verbosity normal
